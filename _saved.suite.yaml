name: Saved Tests
description: Individual saved tests
defaults: {}
waitBetweenTests: 2000
tests:
  - id: issue-flow-check
    name: issue_flow_check
    goal: verify all images on the page load successfully and are not broken
    url: https://the-internet.herokuapp.com/broken_images
    maxSteps: 20
    tags:
      - testing
  - id: failed-login-testing
    name: failed login testing
    goal: attwmpt log in with the username 'wronguser' and password 'wrongpass' and
      verify unsuccessful login happens and that an error appears
    url: https://the-internet.herokuapp.com/login
    maxSteps: 20
    tags:
      - testing
    github: true
  - id: failed-testing-test
    name: Failed testing test
    goal: verify all images on the page load successfully and check for any broken
      resources or links
    url: https://demoqa.com/broken
    maxSteps: 20
    github: true
  - id: search-for-category
    name: search for category
    goal: "login with username: admin and password: dashboard, when the dashboard
      loads search for: API cat facts and click on the result - goal is clicking
      on the returned result"
    url: http://localhost:8224/pi
    maxSteps: 20
  - id: external-url-banner-verification
    name: External url banner verification
    goal: 'login with username: admin and password: dashboard, when the dashboard
      loads search for: API cat facts and click on the result and then wait for
      the category to load. Once loaded, click on the img. The goal is make a
      blue toast banner appears that says: "External URL link has been
      launched." when you click on the cat'
    url: http://localhost:8224/pi
    maxSteps: 20
  - id: forgotten-password-screen
    name: forgotten password screen
    goal: load the login page and click the forgotten password screen wait for it to
      load
    url: http://localhost:8224/pi
    maxSteps: 20
    tags:
      - login
  - id: open-dates-category
    name: open dates category
    goal: 'login with username: admin password: dashboard, wait for dashboard to
      load. Click on this selector: "#category-searchable-list-area > div > div
      > ul > li:nth-child(2) > div > span" and then click on
      "#category-searchable-list-area > div > div > ul > li:nth-child(2) > ul >
      li:nth-child(7)". Goal is to ensure the Dates category opens'
    url: http://localhost:8224/pi
    maxSteps: 20
    tags:
      - smoke
  - id: delete-this-after
    name: delete this after
    goal: "login with username: admin password: dashboard, wait for dashboard to
      load. click on the dashboard category to expand it and then click on dates
      category. Goal is to ensure the Dates category opens"
    url: http://localhost:8224/pi
    maxSteps: 20
  - id: football
    name: football
    goal: load the website, click on sport and then click on football. Goal is to
      open the football page
    url: bbc.com
    maxSteps: 20
